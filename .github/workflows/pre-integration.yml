name: Pre-Integration

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  unit_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version:
          - "3.8"
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v2
        # this workflow needs java so that it can run a local instance of spark
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python_version }}
      - name: Install test requirements
        run: pip install -r dev_requirements.txt
      - name: Check code formatting
        run: |
          black --check .
          isort --check .
      - name: Check code linting
        run: flake8 .
      - name: Install the package
        run: pip install .
      - name: Run Tests
        run: python -m pytest tests/local



  integration_test:
#    needs: unit_test # integration can be run in parallel with unit-tests
    runs-on: ubuntu-latest
    environment: azure
    concurrency: azure-integration
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.8"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine packaging spetlr-tools
      - name: Build
        shell: pwsh
        run: .github/submit/build.ps1
      - name: Log in to azure
        shell: pwsh
        run: |
          az login --service-principal `
            -u ${{ secrets.SPN_CLIENT_ID }} `
            -p ${{ secrets.SPN_CLIENT_SECRET }} `
            --tenant ${{ secrets.SPN_TENANT_ID }}
      - name: Create Deployment
        shell: pwsh
        run: |
          .github/deploy/deploy.ps1 `
            -pipelineClientId ${{ secrets.SPN_CLIENT_ID }} `
            -uniqueRunId "${{ github.run_id }}${{ github.run_attempt }}"

      - name: Wait 30 secs for things to settle
        shell: pwsh
        run: Start-Sleep -s 30


      - name: Launch integration tests 9.1
        shell: pwsh
        run: |
          spetlr-test-job submit `
            --tests tests/ `
            --task tests/cluster/ `
            --cluster-file .github/submit/cluster91.json `
            --requirements-file test_requirements.txt `
            --sparklibs-file .github/submit/sparklibs91.json `
            --out-json test91.json


      - name: Launch integration tests 10.4
        shell: pwsh
        run: |
          spetlr-test-job submit `
            --tests tests/ `
            --task tests/cluster/ `
            --cluster-file .github/submit/cluster104.json `
            --requirements-file test_requirements.txt `
            --sparklibs-file .github/submit/sparklibs104.json `
            --out-json test104.json

      - name: Launch integration tests 11.3
        shell: pwsh
        run: |
          spetlr-test-job submit `
          --tests tests/ `
          --task tests/cluster/ `
          --cluster-file .github/submit/cluster113.json `
          --requirements-file test_requirements.txt `
          --sparklibs-file .github/submit/sparklibs113.json `
          --out-json test113.json

      - name: Wait 2 min for things to settle
        shell: pwsh
        run: Start-Sleep -s 120

      - name: Fetch integration tests 9.1
        shell: pwsh
        run: spetlr-test-job fetch --runid-json test91.json

      - name: Fetch integration tests 10.4
        shell: pwsh
        run: spetlr-test-job fetch --runid-json test104.json

      - name: Fetch integration tests 11.3
        shell: pwsh
        run: spetlr-test-job fetch --runid-json job113.json

      - name: Delete Deployment
        if: always() # this step runs even if the pipeline is manually cancelled
        shell: pwsh
        run: |
          az login --service-principal `
            -u ${{ secrets.SPN_CLIENT_ID }} `
            -p ${{ secrets.SPN_CLIENT_SECRET }} `
            --tenant ${{ secrets.SPN_TENANT_ID }}
          .github/deploy/destroy.ps1 `
            -uniqueRunId "${{ github.run_id }}${{ github.run_attempt }}"
